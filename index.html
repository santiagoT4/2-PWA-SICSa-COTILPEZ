<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f766e">
  <title>Cotilpez POS - Diagnóstico</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    button:active { transform: scale(0.97); transition: transform 0.05s; }
    button:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }
    .log-area {
      background: #1a1a2e;
      color: #0f0;
      font-family: monospace;
      font-size: 12px;
      padding: 12px;
      border-radius: 12px;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .log-error { color: #ff6b6b; }
    .log-success { color: #51cf66; }
    .log-info { color: #74c0fc; }
    .diagnostic-panel {
      background: #f8f9fa;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body class="bg-gray-100">

<div id="app" class="min-h-screen p-4">
  <div class="max-w-4xl mx-auto">
    <!-- Header -->
    <div class="bg-teal-700 text-white p-4 rounded-xl mb-4">
      <h1 class="font-bold text-xl">🐟 Cotilpez POS - Diagnóstico</h1>
      <p class="text-sm text-teal-200">Panel para identificar problemas de carga de datos</p>
    </div>

    <!-- Configuración -->
    <div class="bg-white rounded-xl p-4 shadow-sm border mb-4">
      <h2 class="font-bold text-lg mb-2">⚙️ Configuración</h2>
      <div class="mb-2">
        <label class="text-sm font-medium">URL de Apps Script:</label>
        <input type="text" id="apiUrl" class="w-full border border-gray-300 rounded-lg p-2 text-sm font-mono" 
               value="https://script.google.com/macros/s/AKfycbyDh5wTyJELKBRCi6F3FNQFo3RCq3D9PugZhUSLPw6pHIHXCzzdSSk9DNmn3K2D7Zq-rQ/exec">
      </div>
      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="text-sm font-medium">Límite para pruebas:</label>
          <input type="number" id="limite" class="w-full border border-gray-300 rounded-lg p-2 text-sm" value="10">
        </div>
        <div class="flex items-end">
          <button onclick="actualizarURL()" class="w-full bg-gray-500 text-white py-2 rounded-lg text-sm">Actualizar URL</button>
        </div>
      </div>
    </div>

    <!-- Panel de Diagnóstico Rápido -->
    <div class="diagnostic-panel">
      <h2 class="font-bold text-lg mb-3 flex items-center gap-2">🔍 Diagnóstico Rápido</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
        <button onclick="testConexion()" class="bg-teal-600 text-white py-2 rounded-lg text-sm">📡 Probar Conexión</button>
        <button onclick="cargarSoloProductos()" class="bg-blue-600 text-white py-2 rounded-lg text-sm">📦 Solo Productos</button>
        <button onclick="cargarSoloClientes()" class="bg-green-600 text-white py-2 rounded-lg text-sm">👥 Solo Clientes</button>
        <button onclick="cargarSoloPedidos()" class="bg-orange-600 text-white py-2 rounded-lg text-sm">📋 Solo Pedidos</button>
      </div>
    </div>

    <!-- Panel de Diagnóstico por Partes -->
    <div class="diagnostic-panel">
      <h2 class="font-bold text-lg mb-3 flex items-center gap-2">🎯 Diagnóstico por Partes</h2>
      <div class="grid grid-cols-2 gap-2 mb-4">
        <button onclick="cargarProductosLimitados()" class="bg-blue-500 text-white py-2 rounded-lg text-sm">📦 Productos (limitado)</button>
        <button onclick="cargarClientesLimitados()" class="bg-green-500 text-white py-2 rounded-lg text-sm">👥 Clientes (limitado)</button>
        <button onclick="cargarDetallesPedido()" class="bg-purple-600 text-white py-2 rounded-lg text-sm">📄 Detalles Pedido</button>
        <button onclick="cargarUsuarios()" class="bg-pink-600 text-white py-2 rounded-lg text-sm">👤 Usuarios</button>
        <button onclick="cargarRawResponse()" class="bg-gray-600 text-white py-2 rounded-lg text-sm">📄 Ver Respuesta Cruda</button>
        <button onclick="limpiarLog()" class="bg-red-600 text-white py-2 rounded-lg text-sm">🗑️ Limpiar Log</button>
      </div>
    </div>

    <!-- Resultados -->
    <div class="bg-white rounded-xl p-4 shadow-sm border mb-4">
      <h2 class="font-bold text-lg mb-2">📊 Resultados</h2>
      <div id="resultado" class="text-sm">
        <p class="text-gray-400">Presiona un botón para iniciar el diagnóstico...</p>
      </div>
    </div>

    <!-- Log de Diagnóstico -->
    <div class="bg-white rounded-xl p-4 shadow-sm border">
      <h2 class="font-bold text-lg mb-2">📝 Log de Diagnóstico</h2>
      <div id="log" class="log-area">
        <span class="log-info">🚀 Panel de diagnóstico listo</span>
      </div>
    </div>
  </div>
</div>

<script>
  let API_URL = 'https://script.google.com/macros/s/AKfycbwllFEDKizwwdNZTsgyjTVGXsB7jJpIZFK7boIZD15ZszN_Eol5cyKtJInTvOmlSBHh/exec';
  
  function actualizarURL() {
    const input = document.getElementById('apiUrl');
    if (input.value) {
      API_URL = input.value;
      agregarLog(`URL actualizada a: ${API_URL}`, 'info');
    }
  }
  
  function agregarLog(mensaje, tipo = 'info') {
    const logDiv = document.getElementById('log');
    const timestamp = new Date().toLocaleTimeString();
    const clase = tipo === 'error' ? 'log-error' : (tipo === 'success' ? 'log-success' : 'log-info');
    const emoji = tipo === 'error' ? '❌' : (tipo === 'success' ? '✅' : 'ℹ️');
    logDiv.innerHTML += `<div class="${clase}">${emoji} [${timestamp}] ${mensaje}</div>`;
    logDiv.scrollTop = logDiv.scrollHeight;
  }
  
  function mostrarResultado(titulo, data, error = null) {
    const resultDiv = document.getElementById('resultado');
    if (error) {
      resultDiv.innerHTML = `
        <div class="bg-red-50 border border-red-200 rounded-lg p-3">
          <p class="font-bold text-red-700">❌ ${titulo}</p>
          <p class="text-red-600 text-sm mt-1">${error}</p>
          <pre class="bg-red-100 p-2 rounded mt-2 text-xs overflow-auto">${JSON.stringify({error}, null, 2)}</pre>
        </div>
      `;
    } else {
      const dataStr = JSON.stringify(data, null, 2);
      const preview = dataStr.length > 1000 ? dataStr.substring(0, 1000) + '\n... (truncado)' : dataStr;
      resultDiv.innerHTML = `
        <div class="bg-green-50 border border-green-200 rounded-lg p-3">
          <p class="font-bold text-green-700">✅ ${titulo}</p>
          <details class="mt-2">
            <summary class="cursor-pointer text-sm text-green-600">Ver datos (${dataStr.length} caracteres)</summary>
            <pre class="bg-green-100 p-2 rounded mt-2 text-xs overflow-auto max-h-96">${preview}</pre>
          </details>
        </div>
      `;
    }
  }
  
  async function llamarAPI(accion, payload = null) {
    const body = { accion };
    if (payload) body.payload = payload;
    
    agregarLog(`Llamando a API: ${accion}`, 'info');
    const inicio = Date.now();
    
    try {
      const respuesta = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      
      const tiempo = Date.now() - inicio;
      agregarLog(`Respuesta recibida en ${tiempo}ms, status: ${respuesta.status}`, 'info');
      
      const text = await respuesta.text();
      agregarLog(`Respuesta cruda (primeros 200 chars): ${text.substring(0, 200)}`, 'info');
      
      let data;
      try {
        data = JSON.parse(text);
        agregarLog(`JSON válido, success: ${data.success}`, data.success ? 'success' : 'error');
        return data;
      } catch (e) {
        agregarLog(`Error al parsear JSON: ${e.message}`, 'error');
        return { success: false, error: `No es JSON válido: ${text.substring(0, 200)}` };
      }
    } catch (error) {
      const tiempo = Date.now() - inicio;
      agregarLog(`Error en ${tiempo}ms: ${error.message}`, 'error');
      return { success: false, error: error.message };
    }
  }
  
  // ============ FUNCIONES DE DIAGNÓSTICO ============
  
  async function testConexion() {
    agregarLog('=== TEST DE CONEXIÓN ===', 'info');
    const resultado = await llamarAPI('testConexion');
    if (resultado.success) {
      agregarLog(`Conexión exitosa. Mensaje: ${resultado.message}`, 'success');
      mostrarResultado('Conexión Exitosa', resultado);
    } else {
      agregarLog(`Conexión fallida: ${resultado.error}`, 'error');
      mostrarResultado('Conexión Fallida', null, resultado.error);
    }
  }
  
  async function cargarSoloProductos() {
    agregarLog('=== CARGANDO SOLO PRODUCTOS ===', 'info');
    const resultado = await llamarAPI('getSoloProductos');
    if (resultado.success) {
      agregarLog(`Productos cargados: ${resultado.count} registros`, 'success');
      mostrarResultado(`Productos (${resultado.count})`, resultado.data);
    } else {
      agregarLog(`Error: ${resultado.error}`, 'error');
      mostrarResultado('Error en Productos', null, resultado.error);
    }
  }
  
  async function cargarProductosLimitados() {
    const limite = document.getElementById('limite').value;
    agregarLog(`=== CARGANDO PRODUCTOS (primeros ${limite}) ===`, 'info');
    const resultado = await llamarAPI('getProductosLimitados', { limite: parseInt(limite) });
    if (resultado.success) {
      agregarLog(`Productos cargados: ${resultado.count} de ${resultado.total}`, 'success');
      mostrarResultado(`Productos (${resultado.count} de ${resultado.total})`, resultado.data);
    } else {
      agregarLog(`Error: ${resultado.error}`, 'error');
      mostrarResultado('Error en Productos Limitados', null, resultado.error);
    }
  }
  
  async function cargarSoloClientes() {
    agregarLog('=== CARGANDO SOLO CLIENTES ===', 'info');
    const resultado = await llamarAPI('getSoloClientes');
    if (resultado.success) {
      agregarLog(`Clientes cargados: ${resultado.count} registros`, 'success');
      mostrarResultado(`Clientes (${resultado.count})`, resultado.data);
    } else {
      agregarLog(`Error: ${resultado.error}`, 'error');
      mostrarResultado('Error en Clientes', null, resultado.error);
    }
  }
  
  async function cargarClientesLimitados() {
    const limite = document.getElementById('limite').value;
    agregarLog(`=== CARGANDO CLIENTES (primeros ${limite}) ===`, 'info');
    const resultado = await llamarAPI('getClientesLimitados', { limite: parseInt(limite) });
    if (resultado.success) {
      agregarLog(`Clientes cargados: ${resultado.count} de ${resultado.total}`, 'success');
      mostrarResultado(`Clientes (${resultado.count} de ${resultado.total})`, resultado.data);
    } else {
      agregarLog(`Error: ${resultado.error}`, 'error');
      mostrarResultado('Error en Clientes Limitados', null, resultado.error);
    }
  }
  
  async function cargarSoloPedidos() {
    agregarLog('=== CARGANDO SOLO PEDIDOS ===', 'info');
    const resultado = await llamarAPI('getSoloPedidos');
    if (resultado.success) {
      agregarLog(`Pedidos cargados: ${resultado.count} registros`, 'success');
      mostrarResultado(`Pedidos (${resultado.count})`, resultado.data);
    } else {
      agregarLog(`Error: ${resultado.error}`, 'error');
      mostrarResultado('Error en Pedidos', null, resultado.error);
    }
  }
  
  async function cargarDetallesPedido() {
    agregarLog('=== CARGANDO DETALLES DE PEDIDO ===', 'info');
    const resultado = await llamarAPI('getSoloDetallesPedido');
    if (resultado.success) {
      agregarLog(`Detalles cargados: ${resultado.count} registros`, 'success');
      mostrarResultado(`Detalles de Pedido (${resultado.count})`, resultado.data);
    } else {
      agregarLog(`Error: ${resultado.error}`, 'error');
      mostrarResultado('Error en Detalles de Pedido', null, resultado.error);
    }
  }
  
  async function cargarUsuarios() {
    agregarLog('=== CARGANDO USUARIOS ===', 'info');
    const resultado = await llamarAPI('getSoloUsuarios');
    if (resultado.success) {
      agregarLog(`Usuarios cargados: ${resultado.count} registros`, 'success');
      mostrarResultado(`Usuarios (${resultado.count})`, resultado.data);
    } else {
      agregarLog(`Error: ${resultado.error}`, 'error');
      mostrarResultado('Error en Usuarios', null, resultado.error);
    }
  }
  
  async function cargarRawResponse() {
    agregarLog('=== OBTENIENDO RESPUESTA CRUDA ===', 'info');
    const resultado = await llamarAPI('getRawResponse');
    if (resultado.success) {
      agregarLog(`Respuesta cruda obtenida: ${resultado.message}`, 'success');
      mostrarResultado('Respuesta Cruda', resultado);
    } else {
      agregarLog(`Error: ${resultado.error}`, 'error');
      mostrarResultado('Error en Respuesta Cruda', null, resultado.error);
    }
  }
  
  function limpiarLog() {
    document.getElementById('log').innerHTML = '<span class="log-info">🚀 Log limpiado</span>';
    agregarLog('Log limpiado manualmente', 'info');
  }
  
  // Inicializar
  agregarLog(`URL configurada: ${API_URL}`, 'info');
  agregarLog('Panel de diagnóstico listo. Presiona un botón para comenzar.', 'success');
  
  // Exponer funciones globalmente
  window.actualizarURL = actualizarURL;
  window.testConexion = testConexion;
  window.cargarSoloProductos = cargarSoloProductos;
  window.cargarProductosLimitados = cargarProductosLimitados;
  window.cargarSoloClientes = cargarSoloClientes;
  window.cargarClientesLimitados = cargarClientesLimitados;
  window.cargarSoloPedidos = cargarSoloPedidos;
  window.cargarDetallesPedido = cargarDetallesPedido;
  window.cargarUsuarios = cargarUsuarios;
  window.cargarRawResponse = cargarRawResponse;
  window.limpiarLog = limpiarLog;
</script>
</body>
</html>
